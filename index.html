<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ant EV Edge</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0a;
  --surface:#111;
  --surface2:#1a1a1a;
  --border:#2a2a2a;
  --green:#2d6a4f;
  --green-light:#40916c;
  --red:#e63946;
  --blue:#4daaff;
  --text:#f0f0f0;
  --muted:#666;
  --muted2:#333;
}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh}
a{color:var(--blue)}

header{
  border-bottom:1px solid var(--border);
  padding:1.2rem 2rem;
  display:flex;
  align-items:center;
  justify-content:space-between;
  position:sticky;top:0;
  background:rgba(10,10,10,0.96);
  backdrop-filter:blur(8px);
  z-index:100;
}
.logo{font-family:'Bebas Neue',sans-serif;font-size:2rem;color:var(--green-light);letter-spacing:.05em;line-height:1}
.live{display:flex;align-items:center;gap:6px;font-family:'DM Mono',monospace;font-size:11px;color:var(--green-light);letter-spacing:.1em}
.dot{width:6px;height:6px;border-radius:50%;background:var(--green-light);animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

main{padding:2rem;max-width:1000px;margin:0 auto}

.setup{border:1px solid var(--green);border-radius:4px;padding:1.5rem;margin-bottom:1.5rem;background:rgba(45,106,79,.05)}
.setup-title{font-family:'Bebas Neue',sans-serif;font-size:1.1rem;color:var(--green-light);letter-spacing:.05em;margin-bottom:.4rem}
.setup-desc{font-size:13px;color:var(--muted);line-height:1.6;margin-bottom:1rem}

.flex{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
input[type=text],input[type=password],input[type=number]{
  background:var(--surface2);border:1px solid var(--border);border-radius:3px;
  padding:9px 13px;color:var(--text);font-family:'DM Mono',monospace;font-size:13px;outline:none;
}
input:focus{border-color:var(--green-light)}

.btn{
  background:var(--green);color:#fff;border:none;border-radius:3px;
  padding:9px 20px;font-family:'Bebas Neue',sans-serif;font-size:1.05rem;
  letter-spacing:.05em;cursor:pointer;white-space:nowrap;transition:background .15s;
}
.btn:hover{background:var(--green-light)}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-ghost{background:transparent;color:var(--green-light);border:1px solid var(--green);font-size:.85rem}

.key-status{margin-top:8px;font-family:'DM Mono',monospace;font-size:12px;color:var(--muted)}
.key-ok{color:var(--green-light)}
.key-err{color:var(--red)}

.stats{
  display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));
  gap:1px;background:var(--border);border:1px solid var(--border);
  border-radius:4px;overflow:hidden;margin-bottom:1.5rem;
}
.stat{background:var(--surface);padding:.9rem 1.1rem}
.stat-label{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:.1em;margin-bottom:5px}
.stat-val{font-family:'Bebas Neue',sans-serif;font-size:1.5rem;letter-spacing:.03em}
.g{color:var(--green-light)}
.r{color:var(--red)}
.b{color:var(--blue)}

.controls{display:flex;gap:10px;margin-bottom:1.5rem;flex-wrap:wrap;align-items:center}
.tgroup{display:flex;border:1px solid var(--border);border-radius:3px;overflow:hidden}
.tog{
  padding:8px 16px;background:transparent;border:none;
  border-right:1px solid var(--border);color:var(--muted);
  font-family:'DM Mono',monospace;font-size:12px;letter-spacing:.05em;cursor:pointer;transition:all .15s;
}
.tog:last-child{border-right:none}
.tog.on{background:var(--green);color:#fff;font-weight:500}

.status-bar{font-family:'DM Mono',monospace;font-size:12px;color:var(--muted);margin-bottom:1.2rem;min-height:18px}

.picks-title{font-family:'Bebas Neue',sans-serif;font-size:1.6rem;letter-spacing:.05em;color:var(--green-light);margin-bottom:1rem}
.picks{display:flex;flex-direction:column;gap:10px}

.pick{background:var(--surface);border:1px solid var(--border);border-radius:4px;overflow:hidden;animation:fadeUp .3s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.pick.strong{border-left:3px solid var(--green-light)}
.pick.lean{border-left:3px solid var(--blue)}
.pick.skip{border-left:3px solid var(--muted2)}

.pick-top{
  display:flex;align-items:center;gap:1rem;padding:1rem 1.2rem .8rem;
  border-bottom:1px solid var(--border);flex-wrap:wrap;
}
.pick-num{font-family:'Bebas Neue',sans-serif;font-size:2.2rem;color:var(--muted2);line-height:1;min-width:36px}
.pick-info{flex:1;min-width:160px}
.pick-game{font-family:'Bebas Neue',sans-serif;font-size:1.25rem;letter-spacing:.03em;line-height:1;margin-bottom:3px}
.pick-sub{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);letter-spacing:.06em}
.pick-nums{display:flex;gap:14px;align-items:center;flex-wrap:wrap}
.num-block{text-align:right}
.num-label{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:.08em;margin-bottom:2px}
.num-val{font-family:'DM Mono',monospace;font-size:17px;font-weight:500}

.tag{font-family:'Bebas Neue',sans-serif;font-size:.8rem;letter-spacing:.1em;padding:4px 11px;border-radius:2px}
.tag.strong{background:rgba(45,106,79,.2);color:var(--green-light);border:1px solid rgba(64,145,108,.3)}
.tag.lean{background:rgba(77,170,255,.1);color:var(--blue);border:1px solid rgba(77,170,255,.2)}
.tag.skip{background:rgba(80,80,80,.1);color:var(--muted);border:1px solid var(--border)}

.pick-analysis{padding:.9rem 1.2rem;font-size:14px;color:#aaa;line-height:1.7}

.empty{text-align:center;padding:3rem;color:var(--muted)}
.empty-t{font-family:'Bebas Neue',sans-serif;font-size:1.4rem;letter-spacing:.05em;margin-bottom:.5rem}

footer{border-top:1px solid var(--border);padding:1.2rem 2rem;font-family:'DM Mono',monospace;font-size:11px;color:var(--muted2);text-align:center;letter-spacing:.05em;margin-top:3rem}

@media(max-width:600px){
  header,main{padding:1rem}
  .pick-top{flex-direction:column;align-items:flex-start}
}
</style>
</head>
<body>

<header>
  <div class="logo">ANT</div>
  <div class="live"><div class="dot"></div>LIVE ODDS</div>
</header>

<main>

  <div class="setup">
    <div class="setup-title">CONNECT YOUR ODDS API KEY</div>
    <div class="setup-desc">
      Get a free key at <a href="https://the-odds-api.com" target="_blank">the-odds-api.com</a> — Sign up and copy your key. Saved in your browser only.
    </div>
    <div class="flex">
      <input type="password" id="key-input" placeholder="Paste your Odds API key..." style="flex:1;min-width:240px">
      <button class="btn" onclick="saveKey()">SAVE KEY</button>
    </div>
    <div class="key-status" id="key-status"></div>
  </div>

  <div class="stats">
    <div class="stat">
      <div class="stat-label">BANKROLL</div>
      <div class="flex" style="gap:6px;margin-top:4px">
        <input type="number" id="bk-input" value="500" style="width:90px;padding:5px 8px;font-size:13px">
        <button class="btn btn-ghost" style="padding:5px 10px" onclick="setBankroll()">SET</button>
      </div>
    </div>
    <div class="stat"><div class="stat-label">GAMES TODAY</div><div class="stat-val" id="s-games">—</div></div>
    <div class="stat"><div class="stat-label">+EV SPOTS</div><div class="stat-val g" id="s-ev">—</div></div>
    <div class="stat"><div class="stat-label">TOP EV/100</div><div class="stat-val g" id="s-top">—</div></div>
  </div>

  <div class="controls">
    <div class="tgroup">
      <button class="tog on" id="t-nba" onclick="setSport('NBA')">NBA</button>
      <button class="tog" id="t-mlb" onclick="setSport('MLB')">MLB</button>
      <button class="tog" id="t-both" onclick="setSport('BOTH')">BOTH</button>
    </div>
    <div class="tgroup">
      <button class="tog on" id="t-ml" onclick="setBet('ML')">MONEYLINE</button>
      <button class="tog" id="t-sp" onclick="setBet('SP')">SPREAD</button>
    </div>
    <button class="btn" id="fetch-btn" onclick="fetchOdds()" style="margin-left:auto">FETCH TODAY'S GAMES</button>
  </div>

  <div class="status-bar" id="status-bar">Add your API key above, then hit Fetch.</div>
  <div id="output"></div>

</main>

<footer>ANT'S EV EDGE · FOR ENTERTAINMENT PURPOSES ONLY · BET RESPONSIBLY · 21+</footer>

<script>
var apiKey = localStorage.getItem('evApiKey') || '';
var bankroll = parseFloat(localStorage.getItem('evBankroll') || '500');
var sport = 'NBA';
var bet = 'ML';

window.onload = function() {
  document.getElementById('bk-input').value = bankroll;
  if (apiKey) {
    document.getElementById('key-input').value = apiKey;
    setKeyStatus('Key loaded — ready to fetch', true);
  }
};

function saveKey() {
  var v = document.getElementById('key-input').value.trim();
  if (!v) { setKeyStatus('Please paste a key first', false); return; }
  apiKey = v;
  localStorage.setItem('evApiKey', v);
  setKeyStatus('Key saved. You are good to go.', true);
}

function setKeyStatus(msg, ok) {
  var el = document.getElementById('key-status');
  el.textContent = (ok ? '✓ ' : '⚠ ') + msg;
  el.className = 'key-status ' + (ok ? 'key-ok' : 'key-err');
}

function setBankroll() {
  bankroll = parseFloat(document.getElementById('bk-input').value) || 500;
  localStorage.setItem('evBankroll', bankroll);
  setStatus('Bankroll set to $' + bankroll.toFixed(0));
}

function setSport(s) {
  sport = s;
  ['nba','mlb','both'].forEach(function(x) {
    document.getElementById('t-'+x).className = 'tog' + (x.toUpperCase()===s||(s==='BOTH'&&x==='both')?' on':'');
  });
}

function setBet(b) {
  bet = b;
  document.getElementById('t-ml').className = 'tog' + (b==='ML'?' on':'');
  document.getElementById('t-sp').className = 'tog' + (b==='SP'?' on':'');
}

function setStatus(msg) {
  document.getElementById('status-bar').textContent = msg;
}

function toProb(o) {
  o = parseFloat(o);
  return o > 0 ? 100/(o+100) : Math.abs(o)/(Math.abs(o)+100);
}
function noVig(p1,p2) { var t=p1+p2; return [p1/t, p2/t]; }
function calcEV(prob, o) {
  o = parseFloat(o);
  var pay = o > 0 ? o/100 : 100/Math.abs(o);
  return prob*pay - (1-prob);
}
function halfKelly(prob, o) {
  o = parseFloat(o);
  var b = o > 0 ? o/100 : 100/Math.abs(o);
  return Math.max(0, (b*prob-(1-prob))/b) * 0.5;
}
function fmt(o) { return (o>0?'+':'')+o; }

var SPORTS = { NBA:['basketball_nba'], MLB:['baseball_mlb'], BOTH:['basketball_nba','baseball_mlb'] };

async function fetchOdds() {
  if (!apiKey) { setStatus('No API key — save one above first.'); return; }
  var btn = document.getElementById('fetch-btn');
  btn.disabled = true; btn.textContent = 'FETCHING...';
  setStatus('Pulling live odds...');
  document.getElementById('output').innerHTML = '';
  document.getElementById('s-games').textContent = '—';
  document.getElementById('s-ev').textContent = '—';
  document.getElementById('s-top').textContent = '—';

  var market = bet === 'ML' ? 'h2h' : 'spreads';
  var keys = SPORTS[sport];
  var games = [];

  for (var i=0; i<keys.length; i++) {
    var sk = keys[i];
    var url = 'https://api.the-odds-api.com/v4/sports/'+sk+'/odds/?apiKey='+apiKey+'&regions=us&markets='+market+'&oddsFormat=american';
    try {
      var r = await fetch(url);
      var text = await r.text();
      if (!r.ok) {
        var msg = r.status;
        try { msg = JSON.parse(text).message || msg; } catch(e){}
        setStatus('API error ' + r.status + ': ' + msg);
        btn.disabled = false; btn.textContent = 'FETCH TODAY\'S GAMES';
        return;
      }
      var data = JSON.parse(text);
      for (var j=0; j<data.length; j++) {
        data[j]._sport = sk.includes('nba') ? 'NBA' : 'MLB';
        games.push(data[j]);
      }
    } catch(e) {
      setStatus('Network error: ' + e.message);
      btn.disabled = false; btn.textContent = 'FETCH TODAY\'S GAMES';
      return;
    }
  }

  btn.disabled = false; btn.textContent = 'REFRESH';

  if (!games.length) {
    document.getElementById('output').innerHTML = '<div class="empty"><div class="empty-t">NO GAMES RIGHT NOW</div><p>No '+sport+' games with active odds. Check back closer to game time.</p></div>';
    setStatus('No games found.');
    return;
  }

  var picks = [];
  for (var i=0; i<games.length; i++) {
    var g = games[i];
    var fd = null;
    for (var b2=0; b2<(g.bookmakers||[]).length; b2++) {
      if (g.bookmakers[b2].key === 'fanduel') { fd = g.bookmakers[b2]; break; }
    }
    if (!fd) fd = (g.bookmakers||[])[0];
    if (!fd) continue;
    var mkt = (fd.markets||[])[0];
    if (!mkt || mkt.outcomes.length < 2) continue;
    var o1 = mkt.outcomes[0], o2 = mkt.outcomes[1];
    var probs = noVig(toProb(o1.price), toProb(o2.price));
    var ev1 = calcEV(probs[0], o1.price);
    var ev2 = calcEV(probs[1], o2.price);
    var best = ev1 >= ev2
      ? {team:o1.name, odds:o1.price, prob:probs[0], EV:ev1}
      : {team:o2.name, odds:o2.price, prob:probs[1], EV:ev2};
    var k = halfKelly(best.prob, best.odds);
    picks.push({ g:g, best:best, k:k, betAmt:bankroll*k, betType:mkt.key==='h2h'?'Moneyline':'Spread', sport:g._sport });
  }

  picks.sort(function(a,b){ return b.best.EV - a.best.EV; });

  var posCount = picks.filter(function(p){ return p.best.EV > 0; }).length;
  document.getElementById('s-games').textContent = picks.length;
  document.getElementById('s-ev').textContent = posCount;
  document.getElementById('s-top').textContent = picks.length ? '$'+(picks[0].best.EV*100).toFixed(2) : '—';

  var top5 = picks.slice(0,5);

  function vc(EV) { return EV > 0.04 ? 'strong' : EV > 0 ? 'lean' : 'skip'; }
  function vl(EV) { return EV > 0.04 ? 'STRONG BET' : EV > 0 ? 'LEAN' : 'SKIP'; }

  var html = '<div class="picks-title">TODAY\'S TOP PICKS</div><div class="picks">';
  for (var i=0; i<top5.length; i++) {
    var p = top5[i];
    var cls = vc(p.best.EV);
    var evColor = p.best.EV > 0 ? 'g' : 'r';
    html += '<div class="pick '+cls+'" style="animation-delay:'+(i*.07)+'s">';
    html += '<div class="pick-top">';
    html += '<div class="pick-num">0'+(i+1)+'</div>';
    html += '<div class="pick-info"><div class="pick-game">'+p.g.away_team+' @ '+p.g.home_team+'</div>';
    html += '<div class="pick-sub">'+p.sport+' &middot; '+p.betType+' &middot; BET '+p.best.team+' '+fmt(p.best.odds)+'</div></div>';
    html += '<div class="pick-nums">';
    html += '<div class="num-block"><div class="num-label">EV/100</div><div class="num-val '+evColor+'">$'+(p.best.EV*100).toFixed(2)+'</div></div>';
    html += '<div class="num-block"><div class="num-label">WIN PROB</div><div class="num-val b">'+(p.best.prob*100).toFixed(1)+'%</div></div>';
    html += '<div class="num-block"><div class="num-label">BET SIZE</div><div class="num-val g">$'+p.betAmt.toFixed(0)+'</div></div>';
    html += '<div class="tag '+cls+'">'+vl(p.best.EV)+'</div>';
    html += '</div></div>';
    html += '<div class="pick-analysis" id="ai-'+i+'">Loading analysis...</div>';
    html += '</div>';
  }
  html += '</div>';
  document.getElementById('output').innerHTML = html;
  setStatus('Found '+picks.length+' games · '+posCount+' +EV spots · Top 5 shown');

  var factors = [
    'Check injury report within 1 hour of tip — a key player out shifts the true line by 3-5 points.',
    'Verify rest advantage — back-to-back situations significantly impact performance.',
    'Check line movement since open — if the line moved toward this team, sharp money agrees.',
    'Look at recent form (last 5 games) and how this team performs in this role.',
    'Check home/away splits — some teams have major performance gaps by venue.'
  ];

  for (var i=0; i<top5.length; i++) {
    var p = top5[i];
    var EV = p.best.EV;
    var prob = p.best.prob;
    var edge = '';
    if (EV > 0.06) edge = 'Strong edge — market is mispricing '+p.best.team+' at '+fmt(p.best.odds)+'. True win probability of '+(prob*100).toFixed(1)+'% clearly exceeds what the odds imply.';
    else if (EV > 0.02) edge = 'Marginal edge on '+p.best.team+' at '+fmt(p.best.odds)+'. Small positive EV of $'+(EV*100).toFixed(2)+' per $100 — worth a small unit if your read on the matchup aligns.';
    else if (EV > 0) edge = 'Near coin-flip. '+(prob*100).toFixed(1)+'% true probability is barely in your favor. Lean only — bet small if you have additional conviction.';
    else edge = 'Negative EV — books have this priced accurately or against you. The math says skip unless you have strong independent reason.';
    var verdict = EV > 0.04 ? 'PLACE THE BET' : EV > 0 ? 'SMALL UNIT ONLY' : 'SKIP THIS ONE';
    var el = document.getElementById('ai-'+i);
    if (el) el.textContent = edge + ' ' + factors[i % factors.length] + ' — ' + verdict;
  }
}
</script>
</body>
</html>
