<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EV Edge — Daily Betting Analyzer</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0a;--surface:#111;--surface2:#1a1a1a;--border:#2a2a2a;
  --accent:#c8f135;--red:#ff4d4d;--blue:#4daaff;
  --text:#f0f0f0;--muted:#666;--muted2:#333;
  --display:'Bebas Neue',sans-serif;--mono:'DM Mono',monospace;--body:'DM Sans',sans-serif;
}
body{background:var(--bg);color:var(--text);font-family:var(--body);min-height:100vh}
a{color:var(--blue)}

/* HEADER */
header{
  border-bottom:1px solid var(--border);padding:1.2rem 2rem;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;background:rgba(10,10,10,0.96);backdrop-filter:blur(8px);z-index:100;
}
.logo{font-family:var(--display);font-size:2rem;color:var(--accent);letter-spacing:.05em;line-height:1}
.logo span{color:var(--text)}
.live{display:flex;align-items:center;gap:6px;font-family:var(--mono);font-size:11px;color:var(--accent);letter-spacing:.1em}
.dot{width:6px;height:6px;border-radius:50%;background:var(--accent);animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* LAYOUT */
main{padding:2rem;max-width:1000px;margin:0 auto}

/* SETUP CARD */
.setup{border:1px solid var(--accent);border-radius:4px;padding:1.5rem;margin-bottom:1.5rem;background:rgba(200,241,53,.03)}
.setup-title{font-family:var(--display);font-size:1.1rem;color:var(--accent);letter-spacing:.05em;margin-bottom:.4rem}
.setup-desc{font-size:13px;color:var(--muted);line-height:1.6;margin-bottom:1rem}
.row{display:flex;gap:10px;flex-wrap:wrap}
input[type=text],input[type=password],input[type=number]{
  background:var(--surface2);border:1px solid var(--border);border-radius:3px;
  padding:9px 13px;color:var(--text);font-family:var(--mono);font-size:13px;outline:none;
}
input:focus{border-color:var(--accent)}
.btn{
  background:var(--accent);color:#000;border:none;border-radius:3px;
  padding:9px 20px;font-family:var(--display);font-size:1.05rem;letter-spacing:.05em;
  cursor:pointer;white-space:nowrap;transition:opacity .15s;
}
.btn:hover{opacity:.85}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-ghost{background:transparent;color:var(--accent);border:1px solid var(--accent);font-size:.85rem}
.key-status{margin-top:8px;font-family:var(--mono);font-size:12px;color:var(--muted)}
.key-status.ok{color:var(--accent)}
.key-status.err{color:var(--red)}

/* STATS BAR */
.stats{
  display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));
  gap:1px;background:var(--border);border:1px solid var(--border);border-radius:4px;
  overflow:hidden;margin-bottom:1.5rem;
}
.stat{background:var(--surface);padding:.9rem 1.1rem}
.stat-label{font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:.1em;margin-bottom:5px}
.stat-val{font-family:var(--display);font-size:1.5rem;letter-spacing:.03em}
.stat-val.green{color:var(--accent)}
.stat-val.red{color:var(--red)}

/* CONTROLS */
.controls{display:flex;gap:10px;margin-bottom:1.5rem;flex-wrap:wrap;align-items:center}
.toggle-group{display:flex;border:1px solid var(--border);border-radius:3px;overflow:hidden}
.tog{
  padding:8px 16px;background:transparent;border:none;border-right:1px solid var(--border);
  color:var(--muted);font-family:var(--mono);font-size:12px;letter-spacing:.05em;cursor:pointer;transition:all .15s;
}
.tog:last-child{border-right:none}
.tog.on{background:var(--accent);color:#000;font-weight:500}

/* STATUS */
.status{font-family:var(--mono);font-size:12px;color:var(--muted);margin-bottom:1.2rem;min-height:18px}
.status.err{color:var(--red)}
.status.ok{color:var(--accent)}

/* PICKS */
.picks-title{font-family:var(--display);font-size:1.6rem;letter-spacing:.05em;color:var(--accent);margin-bottom:1rem}
.picks{display:flex;flex-direction:column;gap:10px}

.pick{
  background:var(--surface);border:1px solid var(--border);border-radius:4px;
  overflow:hidden;animation:fadeUp .3s ease both;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.pick.strong{border-left:3px solid var(--accent)}
.pick.lean{border-left:3px solid var(--blue)}
.pick.skip{border-left:3px solid var(--muted2)}

.pick-top{
  display:flex;align-items:center;gap:1rem;padding:1rem 1.2rem .8rem;
  border-bottom:1px solid var(--border);flex-wrap:wrap;
}
.pick-num{font-family:var(--display);font-size:2.2rem;color:var(--muted2);line-height:1;min-width:36px}
.pick-info{flex:1;min-width:160px}
.pick-game{font-family:var(--display);font-size:1.25rem;letter-spacing:.03em;line-height:1;margin-bottom:3px}
.pick-sub{font-family:var(--mono);font-size:11px;color:var(--muted);letter-spacing:.06em}
.pick-nums{display:flex;gap:14px;align-items:center;flex-wrap:wrap}
.num-block{text-align:right}
.num-label{font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:.08em;margin-bottom:2px}
.num-val{font-family:var(--mono);font-size:17px;font-weight:500}
.num-val.g{color:var(--accent)}
.num-val.r{color:var(--red)}
.num-val.b{color:var(--blue)}
.tag{font-family:var(--display);font-size:.8rem;letter-spacing:.1em;padding:4px 11px;border-radius:2px}
.tag.strong{background:rgba(200,241,53,.12);color:var(--accent);border:1px solid rgba(200,241,53,.25)}
.tag.lean{background:rgba(77,170,255,.1);color:var(--blue);border:1px solid rgba(77,170,255,.2)}
.tag.skip{background:rgba(80,80,80,.1);color:var(--muted);border:1px solid var(--border)}

.pick-analysis{padding:.9rem 1.2rem;font-size:14px;color:#aaa;line-height:1.7}
.pick-analysis.loading{color:var(--muted);font-family:var(--mono);font-size:12px;animation:blink 1.2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.35}}

/* EMPTY */
.empty{text-align:center;padding:3rem;color:var(--muted)}
.empty-t{font-family:var(--display);font-size:1.4rem;letter-spacing:.05em;margin-bottom:.5rem}
.empty-d{font-size:13px;line-height:1.6}

footer{border-top:1px solid var(--border);padding:1.2rem 2rem;font-family:var(--mono);font-size:11px;color:var(--muted2);text-align:center;letter-spacing:.05em;margin-top:3rem}

@media(max-width:600px){
  header{padding:1rem}main{padding:1rem}
  .pick-top{flex-direction:column;align-items:flex-start}
}
</style>
</head>
<body>

<header>
  <div class="logo">EV<span>EDGE</span></div>
  <div class="live"><div class="dot"></div>LIVE ODDS</div>
</header>

<main>

  <!-- SETUP -->
  <div class="setup">
    <div class="setup-title">CONNECT YOUR ODDS API KEY</div>
    <div class="setup-desc">
      Free key at <a href="https://the-odds-api.com" target="_blank">the-odds-api.com</a> → Sign up → copy your key. Saved in your browser only.
    </div>
    <div class="row">
      <input type="password" id="key-input" placeholder="Paste your Odds API key..." style="flex:1;min-width:240px">
      <button class="btn" onclick="saveKey()">SAVE KEY</button>
    </div>
    <div class="key-status" id="key-status"></div>
  </div>

  <!-- STATS -->
  <div class="stats">
    <div class="stat">
      <div class="stat-label">BANKROLL</div>
      <div class="row" style="gap:6px;align-items:center;margin-top:4px">
        <input type="number" id="bk-input" value="500" style="width:90px;padding:5px 8px;font-size:13px">
        <button class="btn btn-ghost" style="padding:5px 10px;font-size:.8rem" onclick="setBankroll()">SET</button>
      </div>
    </div>
    <div class="stat"><div class="stat-label">GAMES TODAY</div><div class="stat-val" id="s-games">—</div></div>
    <div class="stat"><div class="stat-label">+EV SPOTS</div><div class="stat-val green" id="s-ev">—</div></div>
    <div class="stat"><div class="stat-label">TOP EV/100</div><div class="stat-val green" id="s-top">—</div></div>
  </div>

  <!-- CONTROLS -->
  <div class="controls">
    <div class="toggle-group">
      <button class="tog on" id="t-nba" onclick="setSport('NBA')">NBA</button>
      <button class="tog" id="t-mlb" onclick="setSport('MLB')">MLB</button>
      <button class="tog" id="t-both" onclick="setSport('BOTH')">BOTH</button>
    </div>
    <div class="toggle-group">
      <button class="tog on" id="t-ml" onclick="setBet('ML')">MONEYLINE</button>
      <button class="tog" id="t-sp" onclick="setBet('SP')">SPREAD</button>
    </div>
    <button class="btn" id="fetch-btn" onclick="fetchOdds()" style="margin-left:auto">FETCH TODAY'S GAMES</button>
  </div>

  <div class="status" id="status">Add your API key above, then hit Fetch.</div>

  <!-- PICKS OUTPUT -->
  <div id="output"></div>

</main>

<footer>EVEDGE · FOR ENTERTAINMENT PURPOSES ONLY · BET RESPONSIBLY · 21+</footer>

<script>
// ── STATE ──────────────────────────────────────────────────────────────
let apiKey = localStorage.getItem('evApiKey') || '';
let bankroll = parseFloat(localStorage.getItem('evBankroll') || '500');
let sport = 'NBA';
let bet = 'ML';

// ── INIT ───────────────────────────────────────────────────────────────
window.onload = () => {
  document.getElementById('bk-input').value = bankroll;
  if (apiKey) {
    document.getElementById('key-input').value = apiKey;
    setKeyStatus('✓ Key loaded — ready to fetch', true);
  }
};

// ── KEY / BANKROLL ─────────────────────────────────────────────────────
function saveKey() {
  const v = document.getElementById('key-input').value.trim();
  if (!v) { setKeyStatus('⚠ Please paste a key first', false); return; }
  apiKey = v;
  localStorage.setItem('evApiKey', v);
  setKeyStatus('✓ Key saved. You\'re good to go.', true);
}
function setKeyStatus(msg, ok) {
  const el = document.getElementById('key-status');
  el.textContent = msg;
  el.className = 'key-status ' + (ok ? 'ok' : 'err');
}
function setBankroll() {
  bankroll = parseFloat(document.getElementById('bk-input').value) || 500;
  localStorage.setItem('evBankroll', bankroll);
  setStatus('Bankroll set to $' + bankroll.toFixed(0), false);
}

// ── TOGGLES ────────────────────────────────────────────────────────────
function setSport(s) {
  sport = s;
  ['nba','mlb','both'].forEach(x => document.getElementById('t-'+x).classList.toggle('on', x.toUpperCase()===s || (s==='BOTH' && x==='both')));
}
function setBet(b) {
  bet = b;
  ['ml','sp'].forEach(x => document.getElementById('t-'+x).classList.toggle('on', x.toUpperCase()===b));
}

// ── STATUS ─────────────────────────────────────────────────────────────
function setStatus(msg, isErr) {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = 'status' + (isErr ? ' err' : '');
}

// ── MATH ───────────────────────────────────────────────────────────────
function toProb(o) { o=+o; return o>0 ? 100/(o+100) : Math.abs(o)/(Math.abs(o)+100); }
function noVig(p1,p2) { const t=p1+p2; return [p1/t, p2/t]; }
function ev(prob, o) { o=+o; const pay=o>0?o/100:100/Math.abs(o); return prob*pay-(1-prob); }
function kelly(prob, o) { o=+o; const b=o>0?o/100:100/Math.abs(o); return Math.max(0,(b*prob-(1-prob))/b)*0.5; }

// ── FETCH ──────────────────────────────────────────────────────────────
const SPORTS = { NBA:['basketball_nba'], MLB:['baseball_mlb'], BOTH:['basketball_nba','baseball_mlb'] };

async function fetchOdds() {
  if (!apiKey) { setStatus('⚠ No API key — save one above first.', true); return; }
  const btn = document.getElementById('fetch-btn');
  btn.disabled = true; btn.textContent = 'FETCHING...';
  setStatus('Pulling live FanDuel odds...', false);
  document.getElementById('output').innerHTML = '';
  document.getElementById('s-games').textContent = '—';
  document.getElementById('s-ev').textContent = '—';
  document.getElementById('s-top').textContent = '—';

  const market = bet === 'ML' ? 'h2h' : 'spreads';
  const keys = SPORTS[sport];
  let games = [];

  for (const sk of keys) {
    const url = `https://api.the-odds-api.com/v4/sports/${sk}/odds/?apiKey=${apiKey}&regions=us&markets=${market}&oddsFormat=american`;
    try {
      const r = await fetch(url);
      const text = await r.text();
      if (!r.ok) {
        let msg = r.status;
        try { msg = JSON.parse(text).message || msg; } catch(e){}
        setStatus(`⚠ API error ${r.status}: ${msg}`, true);
        btn.disabled = false; btn.textContent = 'FETCH TODAY\'S GAMES';
        return;
      }
      const data = JSON.parse(text);
      games = games.concat(data.map(g => ({...g, _sport: sk.includes('nba')?'NBA':'MLB'})));
    } catch(e) {
      setStatus(`⚠ Network error: ${e.message}`, true);
      btn.disabled = false; btn.textContent = 'FETCH TODAY\'S GAMES';
      return;
    }
  }

  btn.disabled = false; btn.textContent = 'REFRESH';

  if (!games.length) {
    document.getElementById('output').innerHTML = `<div class="empty"><div class="empty-t">NO GAMES RIGHT NOW</div><div class="empty-d">No ${sport} games with active odds. Check back closer to game time.</div></div>`;
    setStatus('No games found.', false);
    return;
  }

  // ── SCORE EVERY GAME ────────────────────────────────────────────────
  let picks = [];
  for (const g of games) {
    const fd = g.bookmakers?.find(b => b.key === 'fanduel') || g.bookmakers?.[0];
    if (!fd) continue;
    const mkt = fd.markets?.[0];
    if (!mkt || mkt.outcomes.length < 2) continue;
    const [o1, o2] = mkt.outcomes;
    const [t1, t2] = noVig(toProb(o1.price), toProb(o2.price));
    const ev1 = ev(t1, o1.price), ev2 = ev(t2, o2.price);
    const best = ev1 >= ev2 ? {team:o1.name, odds:o1.price, prob:t1, EV:ev1} : {team:o2.name, odds:o2.price, prob:t2, EV:ev2};
    const k = kelly(best.prob, best.odds);
    picks.push({ g, best, k, betAmt: bankroll*k, betType: mkt.key==='h2h'?'Moneyline':'Spread', sport:g._sport });
  }

  picks.sort((a,b) => b.best.EV - a.best.EV);

  const posCount = picks.filter(p => p.best.EV > 0).length;
  document.getElementById('s-games').textContent = picks.length;
  document.getElementById('s-ev').textContent = posCount;
  document.getElementById('s-top').textContent = picks.length ? '$'+(picks[0].best.EV*100).toFixed(2) : '—';

  // ── RENDER TOP 5 ────────────────────────────────────────────────────
  const top5 = picks.slice(0,5);
  const oddsStr = o => (o>0?'+':'')+o;
  const verdictClass = EV => EV > 0.04 ? 'strong' : EV > 0 ? 'lean' : 'skip';
  const verdictLabel = EV => EV > 0.04 ? 'STRONG BET' : EV > 0 ? 'LEAN' : 'SKIP';

  document.getElementById('output').innerHTML = `
    <div class="picks-title">TODAY'S TOP PICKS</div>
    <div class="picks">
      ${top5.map((p,i) => {
        const vc = verdictClass(p.best.EV);
        const evColor = p.best.EV > 0 ? 'g' : 'r';
        return `<div class="pick ${vc}" style="animation-delay:${i*.07}s">
          <div class="pick-top">
            <div class="pick-num">0${i+1}</div>
            <div class="pick-info">
              <div class="pick-game">${p.g.away_team} @ ${p.g.home_team}</div>
              <div class="pick-sub">${p.sport} · ${p.betType} · BET ${p.best.team} ${oddsStr(p.best.odds)}</div>
            </div>
            <div class="pick-nums">
              <div class="num-block"><div class="num-label">EV/100</div><div class="num-val ${evColor}">$${(p.best.EV*100).toFixed(2)}</div></div>
              <div class="num-block"><div class="num-label">WIN PROB</div><div class="num-val b">${(p.best.prob*100).toFixed(1)}%</div></div>
              <div class="num-block"><div class="num-label">BET SIZE</div><div class="num-val g">$${p.betAmt.toFixed(0)}</div></div>
              <div class="tag ${vc}">${verdictLabel(p.best.EV)}</div>
            </div>
          </div>
          <div class="pick-analysis loading" id="ai-${i}">Fetching AI analysis...</div>
        </div>`;
      }).join('')}
    </div>`;

  setStatus(`Found ${picks.length} games · ${posCount} +EV spots · Top 5 shown below`, false);

  // ── AI ANALYSIS ─────────────────────────────────────────────────────
  for (let i=0; i<top5.length; i++) {
    const p = top5[i];
    const prompt = `Sharp betting analyst. Be direct, max 80 words.
Game: ${p.g.away_team} @ ${p.g.home_team} (${p.sport})
Bet: ${p.best.team} ${p.betType} ${oddsStr(p.best.odds)}
True win prob: ${(p.best.prob*100).toFixed(1)}% · EV/100: $${(p.best.EV*100).toFixed(2)} · Bet size: $${p.betAmt.toFixed(0)}
Give: 1) Does this have real edge or is it marginal? 2) One factor to verify before betting. 3) Final verdict in 3 words.`;
    fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,messages:[{role:'user',content:prompt}]})
    }).then(r=>r.json()).then(d=>{
      const el = document.getElementById('ai-'+i);
      if (el) { el.textContent = d.content?.[0]?.text || 'Analysis unavailable.'; el.classList.remove('loading'); }
    }).catch(()=>{
      const el = document.getElementById('ai-'+i);
      if (el) { el.textContent = 'AI analysis unavailable.'; el.classList.remove('loading'); }
    });
  }
}
</script>
</body>
</html>
